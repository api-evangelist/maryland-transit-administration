aid: maryland-transit-administration
name: Maryland Transit Administration
description: >-
  The Maryland Transit Administration (MDOT MTA) supports open transit data
  initiatives and makes resources available to developers and applications.
  It primarily uses the General Transit Feed Specification (GTFS) and GTFS-RT
  to convey schedule, geographic, fare, vehicle position, and trip update
  data for Local Bus, Light Rail, Metro Subway, MARC Train, and Commuter Bus
  services in a standardized format.
type: Index
